{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}

<div id="hospitalCarousel" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators -->
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#hospitalCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#hospitalCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#hospitalCarousel" data-bs-slide-to="2"></button>
    </div>

    <!-- Slides -->
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="/static/images/hsptl.jfif" class="d-block w-100" style="height:500px; object-fit:cover;">
            <div class="carousel-caption">
                <h2>Welcome to City Hospital</h2>
                <p>Best healthcare services</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="/static/images/hsptl2.jfif" class="d-block w-100" style="height:500px; object-fit:cover;">
            <div class="carousel-caption">
                <h2>Expert Doctors</h2>
                <p>Qualified and experienced specialists</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="/static/images/hsptl3.jfif" class="d-block w-100" style="height:500px; object-fit:cover;">
            <div class="carousel-caption">
                <h2>24/7 Emergency</h2>
                <p>Always ready to help you</p>
            </div>
        </div>

    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#hospitalCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#hospitalCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

{% endblock %}
