<style>
    :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f3f4f6;
        --text-main: #1f2937;
        --text-muted: #6b7280;
    }

    body {
        font-family: 'Inter', -apple-system, sans-serif;
        background-color: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    .login-container {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        border-radius: 1.25rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    h2 {
        text-align: center;
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
    }

    /* Django form.as_p styling */
    form p {
        margin-bottom: 1.25rem;
        position: relative;
    }

    form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: var(--text-main);
    }

    form input {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.6rem;
        font-size: 1rem;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }

    form input:focus {
        outline: none;
        border-color: var(--primary);
        ring: 3px rgba(79, 70, 229, 0.2);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-options {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
    }

    .form-options a {
        color: var(--primary);
        text-decoration: none;
    }

    button {
        width: 100%;
        padding: 0.8rem;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 0.6rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, background-color 0.2s;
    }

    button:hover {
        background-color: var(--primary-hover);
    }

    button:active {
        transform: scale(0.98);
    }

    .footer-text {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .footer-text a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
    }
</style>

<div class="login-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to sign in</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="form-options">
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <p class="footer-text">
        New here? <a href="{% url 'signup' %}">Sign up for free</a>
    </p>
</div>
